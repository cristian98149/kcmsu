name: Build and Push Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'chart/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Build Helm Chart
        run: helm package ./chart

      - name: Authenticate to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Helm Chart to GHCR
        run: |
          export CHART_VERSION=$(helm show chart ./chart | grep version | cut -d ':' -f 2 | xargs)
          export CHART_NAME=$(helm show chart ./chart | grep name | cut -d ':' -f 2 | xargs)
          docker push ghcr.io/${{ github.repository_owner }}/${CHART_NAME}:${CHART_VERSION}
